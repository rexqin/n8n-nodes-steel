name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: "https://registry.npmjs.org"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile=false

      - name: Import secrets from Infisical (OIDC Machine Identity)
        uses: Infisical/secrets-action@v1.0.9
        with:
          method: "oidc"
          identity-id: "436a2630-fad8-475b-8f00-5ab158e9919e"
          project-slug: "project-nd-zj"
          env-slug: "dev"

      - name: Validate imported npm token
        run: |
          if [ -z "${NPM_TOKEN:-}" ]; then
            echo "NPM_TOKEN missing from Infisical import"
            exit 1
          fi
          if [ "${NPM_TOKEN}" = "__PENDING_APPLY__" ]; then
            echo "NPM_TOKEN is still __PENDING_APPLY__ in Infisical"
            exit 1
          fi

      - name: Build
        run: pnpm run build

      - name: Lint
        run: pnpm run lint

      - name: Publish to npm
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ env.NPM_TOKEN }}
